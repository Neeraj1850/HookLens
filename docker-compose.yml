services:
  web:
    build:
      context: .
      args:
        VITE_THEGRAPH_API_KEY: ${VITE_THEGRAPH_API_KEY}
        VITE_ALCHEMY_API_KEY: ${VITE_ALCHEMY_API_KEY:-}
        VITE_UNISWAP_PROXY_URL: ${VITE_UNISWAP_PROXY_URL:-}
        VITE_OLLAMA_PROXY_URL: ${VITE_OLLAMA_PROXY_URL:-/hooklens-ollama}
        VITE_HOOKLENS_DEBUG_SUBGRAPH: ${VITE_HOOKLENS_DEBUG_SUBGRAPH:-false}
        VITE_HOOKLENS_DEBUG_QUOTES: ${VITE_HOOKLENS_DEBUG_QUOTES:-false}
    ports:
      - '8080:8080'
    environment:
      PORT: 8080
      UNISWAP_API_KEY: ${UNISWAP_API_KEY}
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    ports:
      - '11434:11434'
    volumes:
      - ollama-data:/root/.ollama

  ollama-pull:
    image: ollama/ollama:latest
    profiles:
      - setup
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
    entrypoint: ['/bin/sh', '-c']
    command:
      - "until ollama list >/dev/null 2>&1; do sleep 2; done; ollama pull $${OLLAMA_MODEL}"
    depends_on:
      - ollama

volumes:
  ollama-data:
